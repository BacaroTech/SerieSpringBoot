services:
  db:
    container_name: db
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=serie_springboot
    ports:
      - 5432:5432
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
  redis:
    container_name: redis
    image: redis:8.4.2
    ports:
      - 6379:6379
    environment:
      - REDIS_PASSWORD=password
    command: >
      sh -c "redis-server --requirepass $$REDIS_PASSWORD"
    volumes:
      - cache:/data

  be:
    container_name: be
    build:
      context: .
    image: seriespringboot-be
    env_file:
      - be.env
    ports:
      - 8080:8080

volumes:
  db_postgres_data:
  cache: